<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { width: 280px; padding: 16px; background: #1a1a2e; color: #e0d6c8; }
    h2 { font-size: 13px; font-weight: 700; color: #c9a84c; margin-bottom: 12px; letter-spacing: .5px; text-transform: uppercase; }
    label { font-size: 11px; color: #a0968a; display: block; margin-bottom: 4px; }
    textarea {
      width: 100%; height: 80px; background: #111827; border: 1px solid #2d2d3a;
      border-radius: 6px; color: #e0d6c8; font-size: 12px; padding: 8px;
      resize: none; outline: none;
    }
    textarea:focus { border-color: #c9a84c; }
    .hint { font-size: 10px; color: #665e56; margin-top: 4px; }
    button {
      margin-top: 12px; width: 100%; padding: 8px; background: #c9a84c;
      color: #1a1a2e; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer;
    }
    button:hover { background: #e0c068; }
    #status { margin-top: 8px; font-size: 11px; text-align: center; color: #4caf82; min-height: 16px; }
    .divider { border: none; border-top: 1px solid #2d2d3a; margin: 14px 0; }
    .app-status { font-size: 11px; color: #665e56; display: flex; align-items: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .dot.online { background: #4caf82; }
  </style>
</head>
<body>
  <h2>🔔 Discord Monitor</h2>
  <label>Keywords (comma separated)</label>
  <textarea id="keywords" placeholder="restock, W2C, in stock, cop, nike dunk..."></textarea>
  <div class="hint">Alerts fire when any keyword appears in a new message</div>
  <button id="save">Save Keywords</button>
  <div id="status"></div>
  <hr class="divider">
  <div class="app-status">
    <div class="dot" id="app-dot"></div>
    <span id="app-label">Checking Resell Tracker...</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
