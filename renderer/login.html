<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resell Tracker — Login</title>
  <link rel="stylesheet" href="app.css" />
  <style>
    html, body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 44px 40px;
      width: 380px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .login-app-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #22c55e, #0d9488);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(34,197,94,0.35);
    }

    .login-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .btn-discord {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #5865F2;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 16px rgba(88,101,242,0.4);
    }
    .btn-discord:hover {
      background: #4752c4;
      box-shadow: 0 4px 20px rgba(88,101,242,0.55);
      transform: translateY(-1px);
    }
    .btn-discord:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-status {
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      min-height: 20px;
    }
    .login-status.waiting  { color: var(--text-muted); }
    .login-status.error    { color: var(--red); }
    .login-status.success  { color: var(--green-text); }

    .login-divider {
      width: 100%;
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0 20px;
    }

    .login-help {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-app-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    </svg>
  </div>

  <h1 class="login-title">Resell Tracker</h1>
  <p class="login-subtitle">Sign in with Discord to verify your subscription and access your dashboard.</p>

  <button class="btn-discord" id="btn-login">
    <!-- Discord logo SVG -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    Continue with Discord
  </button>

  <div class="login-status" id="login-status"></div>

  <hr class="login-divider" />
  <p class="login-help">
    Need access? Join our Discord and grab a subscription to get started.
  </p>
</div>

<script src="login.js"></script>
</body>
</html>
